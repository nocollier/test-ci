name: "Regenerate the artifacts"
description: "Runs the submitted convert.py to create artifacts to be ingested."
on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    
jobs:
  build:
    if: github.repository == 'nocollier/test-ci'  && github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps: 
      - name: Install uv environment
        uses: astral-sh/setup-uv@v4

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Generate artifacts & validate
        run: |
          git fetch origin main -q
          CONVERT_FILES=$(git diff --name-only HEAD^ HEAD | grep convert.py)
          REPO_ROOT=$PWD
          for FILE in $CONVERT_FILES; do
              echo "Running ${FILE}..."
              cd "$(dirname "${FILE}")"
              uv run python convert.py
              for NC_FILE in $(ls *.nc); do
                echo "  Validating ${NC_FILE}..."
              done
              cd $REPO_ROOT
          done

